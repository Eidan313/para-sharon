<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Sharon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:        #ff6eb4;
    --violet:      #c084fc;
    --gold:        #f5c842;
    --deep:        #08000f;
    --blush:       #fff0f8;
    --glow-rose:   rgba(255,110,180,0.5);
    --glow-violet: rgba(192,132,252,0.4);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--deep); font-family:'Cormorant Garamond',serif; }

  #particles-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

  .screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; transition:opacity 1.2s ease; }
  .screen.hidden { opacity:0; pointer-events:none; }
  #intro { background:radial-gradient(ellipse at center,#1c0028 0%,#08000f 70%); }

  .intro-hint {
    font-size:clamp(1rem,3vw,1.3rem); color:var(--rose);
    letter-spacing:.22em; text-transform:uppercase; font-weight:300;
    text-shadow:0 0 28px var(--glow-rose);
    animation:breathe 2.5s ease-in-out infinite; margin-bottom:2.8rem;
  }
  .intro-sub {
    margin-top:2rem; font-size:clamp(.9rem,2.5vw,1.1rem);
    color:var(--blush); letter-spacing:.15em;
    font-style:italic; font-weight:300; opacity:.7;
    animation:breathe 3s ease-in-out infinite reverse;
  }

  #flower-btn {
    background:none; border:none; cursor:pointer; outline:none;
    position:relative; display:flex; align-items:center; justify-content:center;
    width:150px; height:150px;
  }
  .flower-glow {
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle,var(--glow-rose) 0%,transparent 70%);
    animation:pulseGlow 2.5s ease-in-out infinite;
  }
  .flower-svg {
    width:100px; height:100px; position:relative; z-index:2;
    animation:floatFlower 3s ease-in-out infinite;
    filter:drop-shadow(0 0 16px var(--rose)); transition:transform .25s ease;
  }
  #flower-btn:hover .flower-svg  { transform:scale(1.12) rotate(8deg); }
  #flower-btn:active .flower-svg { transform:scale(.92); }

  #scene { position:fixed; inset:0; z-index:5; opacity:0; pointer-events:none; transition:opacity 1.6s ease; }
  #scene.visible { opacity:1; pointer-events:all; }
  #scene-canvas { width:100%; height:100%; display:block; }

  #message-box {
    position:fixed; top:14%; left:50%; transform:translateX(-50%);
    z-index:20; text-align:center; pointer-events:none;
    padding:1.2rem 2.5rem 1.4rem; width:min(95vw,680px);
    background:radial-gradient(ellipse at center,rgba(18,0,32,.65) 0%,transparent 82%);
    border-radius:2.5rem;
  }
  .romantic-msg {
    font-size:clamp(1.1rem,3.8vw,1.95rem); color:var(--blush);
    font-style:italic; font-weight:300; line-height:1.75;
    letter-spacing:.03em; white-space:pre-line;
    text-shadow:0 0 30px var(--glow-rose),0 0 60px var(--glow-violet),0 2px 12px rgba(0,0,0,.95);
    opacity:0; transition:opacity .6s ease;
  }
  .romantic-msg.show { opacity:1; }
  .name-sharon {
    color:var(--gold); font-style:normal;
    text-shadow:0 0 20px rgba(245,200,66,.75),0 0 40px var(--glow-rose);
  }

  #counter-wrap {
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    text-align:center; padding:1.4rem 1rem 2rem;
    background:linear-gradient(to top,rgba(8,0,15,.97) 55%,transparent);
    opacity:0; transform:translateY(20px);
    transition:opacity 1.8s ease,transform 1.8s ease;
  }
  #counter-wrap.show { opacity:1; transform:translateY(0); }
  .counter-label {
    font-size:clamp(.62rem,1.9vw,.82rem); color:var(--gold);
    letter-spacing:.22em; text-transform:uppercase;
    font-weight:300; opacity:.85; margin-bottom:.6rem;
  }
  .counter-digits { display:flex; justify-content:center; gap:clamp(.5rem,2vw,1.6rem); flex-wrap:wrap; }
  .counter-unit   { display:flex; flex-direction:column; align-items:center; }
  .digit {
    font-size:clamp(1.7rem,5.5vw,3rem); font-weight:300; color:var(--rose);
    line-height:1; font-variant-numeric:tabular-nums; min-width:2ch;
    text-shadow:0 0 24px var(--glow-rose),0 0 48px var(--glow-violet);
  }
  .unit-label {
    font-size:clamp(.55rem,1.5vw,.72rem); color:var(--violet);
    letter-spacing:.16em; text-transform:uppercase; margin-top:.2rem; opacity:.82;
  }
  .counter-sep {
    font-size:clamp(1.4rem,4vw,2.4rem); color:var(--gold);
    opacity:.35; align-self:flex-start; padding-top:.05em; font-weight:300;
  }

  #spiral-label {
    position:fixed; bottom:28%; left:50%; transform:translateX(-50%);
    z-index:25; pointer-events:none; text-align:center;
    font-size:clamp(1rem,3.5vw,1.5rem); color:var(--gold);
    font-style:italic; font-weight:300; letter-spacing:.13em;
    text-shadow:0 0 22px rgba(245,200,66,.55),0 0 44px rgba(245,200,66,.2);
    opacity:0; transition:opacity 1s ease;
  }
  #spiral-label.show { opacity:1; animation:breatheLbl 2.2s ease-in-out infinite; }

  #seed-anim { position:fixed; pointer-events:none; z-index:30; display:none; }

  .ripple {
    position:fixed; border-radius:50%; pointer-events:none; z-index:100;
    background:radial-gradient(circle,rgba(255,110,180,.4),transparent 70%);
    transform:scale(0); animation:rippleOut .75s ease-out forwards;
  }

  @keyframes breathe    { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
  @keyframes breatheLbl { 0%,100%{opacity:.65;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.04)} }
  @keyframes pulseGlow  { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.38);opacity:.25} }
  @keyframes floatFlower{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes rippleOut  { to{transform:scale(9);opacity:0} }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div id="intro" class="screen">
  <p class="intro-hint">Toca aqui para comenzar</p>
  <button id="flower-btn" aria-label="Comenzar">
    <div class="flower-glow"></div>
    <svg class="flower-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="pg1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffd6f0"/><stop offset="100%" stop-color="#d946a8"/></radialGradient>
        <radialGradient id="pg2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#f0c0ff"/><stop offset="100%" stop-color="#9333ea"/></radialGradient>
        <radialGradient id="cg"  cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fef9c3"/><stop offset="100%" stop-color="#f5c842"/></radialGradient>
      </defs>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg1)" opacity=".95" transform="rotate(0 50 50)"/>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg2)" opacity=".85" transform="rotate(45 50 50)"/>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg1)" opacity=".95" transform="rotate(90 50 50)"/>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg2)" opacity=".85" transform="rotate(135 50 50)"/>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg1)" opacity=".95" transform="rotate(180 50 50)"/>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg2)" opacity=".85" transform="rotate(225 50 50)"/>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg1)" opacity=".95" transform="rotate(270 50 50)"/>
      <ellipse cx="50" cy="25" rx="10" ry="18" fill="url(#pg2)" opacity=".85" transform="rotate(315 50 50)"/>
      <circle cx="50" cy="50" r="13" fill="url(#cg)"/>
      <circle cx="50" cy="50" r="7"  fill="#fffde7" opacity=".9"/>
    </svg>
  </button>
  <p class="intro-sub">para <span style="color:var(--gold);letter-spacing:.06em">Sharon</span></p>
</div>

<div id="scene"><canvas id="scene-canvas"></canvas></div>
<div id="message-box"><p class="romantic-msg" id="msg-text"></p></div>
<div id="spiral-label">para ti, <span style="color:var(--gold)">Sharon</span></div>

<div id="counter-wrap">
  <p class="counter-label">Sharon, mi amor por ti empezo hace</p>
  <div class="counter-digits">
    <div class="counter-unit"><span class="digit" id="cnt-days">000</span><span class="unit-label">dias</span></div>
    <span class="counter-sep">.</span>
    <div class="counter-unit"><span class="digit" id="cnt-hours">00</span><span class="unit-label">horas</span></div>
    <span class="counter-sep">.</span>
    <div class="counter-unit"><span class="digit" id="cnt-mins">00</span><span class="unit-label">minutos</span></div>
    <span class="counter-sep">.</span>
    <div class="counter-unit"><span class="digit" id="cnt-secs">00</span><span class="unit-label">segundos</span></div>
  </div>
</div>

<div id="seed-anim">
  <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="sg" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#fff9c4"/>
        <stop offset="55%"  stop-color="#f5c842"/>
        <stop offset="100%" stop-color="#ff6eb4"/>
      </radialGradient>
      <filter id="sgf"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <ellipse cx="16" cy="16" rx="9" ry="13" fill="url(#sg)" filter="url(#sgf)"/>
  </svg>
</div>

<audio id="bg-audio" loop preload="auto"></audio>

<script>
document.getElementById("bg-audio").src="Floricienta%20Flores%20Amarillas%20%5BLetra%5D.mp3";
</script>

<script>
const START_DATE = new Date('2023-04-22T00:00:00');

const MESSAGES = [
  "Sharon... \nesto es solo para ti.",
  "Desde el dia que apareciste\nmi mundo dejo de tener sentido sin ti.\n(Y eso que antes funcionaba bien.)",
  "Eres el tipo de persona\npor la que uno agradece haberse perdido antes\nde poder encontrarte.",
  "Contigo aprendi que el amor no grita.\nSusurra.\nY aun asi lo escucho todo.",
  "Sere honesto:\nno se que hice para merecer a alguien como tu.\nPero tampoco voy a preguntar demasiado.",
  "Mi lugar favorito en el mundo\nno esta en ningun mapa.\nEres tu, <span class='name-sharon'>Sharon</span>.",
  "Gracias por elegirme.\nPor quedarte. Por ser exactamente\nquien eres.",
  "Todo esto...\npara mi fea favorita.",
];

// --- PARTICLES ---
const pCv = document.getElementById('particles-canvas');
const pCx = pCv.getContext('2d');
let parts = [];
function rszP(){ pCv.width = innerWidth; pCv.height = innerHeight; }
addEventListener('resize', rszP); rszP();
const PC = innerWidth < 600 ? 38 : 65;
const PCOLS = ['#ff6eb4','#c084fc','#f5c842','#ffaad4','#e879f9'];
function mkP(){
  return {
    x:Math.random()*pCv.width, y:Math.random()*pCv.height,
    sz:Math.random()*4+2, vx:(Math.random()-.5)*.3, vy:-(Math.random()*.4+.1),
    op:Math.random()*.5+.1, col:PCOLS[0|Math.random()*5],
    type:['heart','dot','star'][0|Math.random()*3],
    ang:Math.random()*Math.PI*2, dAng:(Math.random()-.5)*.022, life:Math.random(),
  };
}
for(let i=0;i<PC;i++) parts.push(mkP());
function drawHeart(x,y,s,col,op){
  pCx.save(); pCx.globalAlpha=op; pCx.fillStyle=col; pCx.beginPath();
  pCx.moveTo(x,y+s*.3);
  pCx.bezierCurveTo(x,y-s*.8,x-s*1.2,y-s*.8,x-s*1.2,y);
  pCx.bezierCurveTo(x-s*1.2,y+s*.8,x,y+s*1.5,x,y+s*1.5);
  pCx.bezierCurveTo(x,y+s*1.5,x+s*1.2,y+s*.8,x+s*1.2,y);
  pCx.bezierCurveTo(x+s*1.2,y-s*.8,x,y-s*.8,x,y+s*.3);
  pCx.fill(); pCx.restore();
}
(function particleLoop(){
  pCx.clearRect(0,0,pCv.width,pCv.height);
  parts.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.ang+=p.dAng; p.life+=.003;
    const w=Math.sin(p.life*Math.PI*2)*.15+.85;
    if(p.y<-20){ parts[i]=mkP(); parts[i].y=pCv.height+10; }
    if(p.type==='heart'){ drawHeart(p.x,p.y,p.sz*.5,p.col,p.op*w); }
    else if(p.type==='star'){
      pCx.save(); pCx.globalAlpha=p.op*w; pCx.fillStyle=p.col;
      pCx.translate(p.x,p.y); pCx.rotate(p.ang); pCx.beginPath();
      for(let k=0;k<5;k++){const a=(k*4*Math.PI)/5-Math.PI/2,r=k%2?p.sz*.4:p.sz;pCx[k?'lineTo':'moveTo'](Math.cos(a)*r,Math.sin(a)*r);}
      pCx.closePath(); pCx.fill(); pCx.restore();
    } else {
      pCx.save(); pCx.globalAlpha=p.op*w; pCx.fillStyle=p.col;
      pCx.shadowColor=p.col; pCx.shadowBlur=7;
      pCx.beginPath(); pCx.arc(p.x,p.y,p.sz*.5,0,Math.PI*2); pCx.fill(); pCx.restore();
    }
  });
  requestAnimationFrame(particleLoop);
})();

// --- RIPPLE ---
document.addEventListener('click',e=>{
  const r=document.createElement('div'); r.className='ripple';
  const s=60; r.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-s/2}px;top:${e.clientY-s/2}px`;
  document.body.appendChild(r); setTimeout(()=>r.remove(),900);
});

// --- AUDIO: chimes only (no synth music) ---
let AC=null;
function initAC(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); }
function tone(freq,dur,type,vol){
  type=type||'sine'; vol=vol||.055;
  if(!AC) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.setValueAtTime(freq,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq*.8,AC.currentTime+dur);
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur);
}
function chime(notes){ notes.forEach(function(n){ setTimeout(function(){ tone(n[0],n[2]||1.2); },n[1]); }); }

// --- FLORES AMARILLAS: desde segundo 17 ---
function playFloresAmarillas(){
  var audio=document.getElementById('bg-audio');
  if(!audio) return;
  audio.currentTime=17;
  audio.volume=0;
  audio.play().then(function(){
    var v=0;
    var fade=setInterval(function(){
      v=Math.min(1,v+.018);
      audio.volume=v;
      if(v>=1) clearInterval(fade);
    },60);
  }).catch(function(){});
}

// --- SCENE CANVAS ---
const sCv=document.getElementById('scene-canvas');
const sCx=sCv.getContext('2d');
let W,H;
function rszS(){ W=sCv.width=innerWidth; H=sCv.height=innerHeight; }
addEventListener('resize',rszS); rszS();
const getBase=function(){ return {x:W/2,y:H*.86}; };
const getTreeH=function(){ return H*.44; };

const BRANCHES=[
  {sx:0,sy:0,ex:-.12,ey:-.22,w:8,d:.45},{sx:0,sy:0,ex:.12,ey:-.22,w:8,d:.50},
  {sx:-.05,sy:-.13,ex:-.22,ey:-.33,w:5,d:.60},{sx:.05,sy:-.13,ex:.22,ey:-.33,w:5,d:.62},
  {sx:-.10,sy:-.20,ex:-.30,ey:-.42,w:4,d:.70},{sx:.10,sy:-.20,ex:.30,ey:-.42,w:4,d:.72},
  {sx:-.14,sy:-.28,ex:-.38,ey:-.50,w:3,d:.78},{sx:.14,sy:-.28,ex:.38,ey:-.50,w:3,d:.78},
  {sx:-.22,sy:-.38,ex:-.18,ey:-.55,w:2,d:.83},{sx:.22,sy:-.38,ex:.18,ey:-.55,w:2,d:.83},
  {sx:0,sy:-.30,ex:0,ey:-.58,w:5,d:.65},
  {sx:-.04,sy:-.45,ex:-.16,ey:-.65,w:3,d:.75},{sx:.04,sy:-.45,ex:.16,ey:-.65,w:3,d:.75},
];

const TREE_FLOWERS=[
  {rx:-.22,ry:-.33,sz:18,dl:1600},{rx:.22,ry:-.33,sz:18,dl:1900},
  {rx:-.30,ry:-.42,sz:16,dl:2200},{rx:.30,ry:-.42,sz:16,dl:2500},
  {rx:-.38,ry:-.50,sz:14,dl:2800},{rx:.38,ry:-.50,sz:14,dl:3000},
  {rx:-.18,ry:-.55,sz:13,dl:3300},{rx:.18,ry:-.55,sz:13,dl:3500},
  {rx:0,ry:-.60,sz:20,dl:3800},
  {rx:-.12,ry:-.65,sz:11,dl:4100},{rx:.12,ry:-.65,sz:11,dl:4100},
  {rx:-.06,ry:-.48,sz:15,dl:4400},{rx:.06,ry:-.48,sz:15,dl:4600},
];
let treeFlowers=TREE_FLOWERS.map(function(f){ return Object.assign({},f,{p:0,on:false}); });

const SPIRAL_N=32;
let spiralFlowers=[],spiralActive=false;
function buildSpiral(){
  var b=getBase(),th=getTreeH();
  spiralFlowers=[];
  for(var i=0;i<SPIRAL_N;i++){
    var t=i/(SPIRAL_N-1);
    var theta=t*3*Math.PI*2;
    var r=Math.min(W,H)*.09*(1-t*.7);
    spiralFlowers.push({
      x:b.x+Math.cos(theta)*r, y:b.y-th*t+Math.sin(theta)*r*.18,
      sz:9+(1-t)*10, p:0, on:false, hue:i%4, delay:i*95
    });
  }
}
function activateSpiral(){
  buildSpiral(); spiralActive=true;
  var lbl=document.getElementById('spiral-label');
  lbl.classList.add('show');
  setTimeout(function(){ lbl.classList.remove('show'); },3500);
  spiralFlowers.forEach(function(f,i){
    setTimeout(function(){
      f.on=true;
      var freq=261+i*(330/SPIRAL_N);
      chime([[freq,0,.5],[freq*1.25,80,.5]]);
    },f.delay);
  });
}

const ORCHID_COLS=[['#ff6eb4','#e91e8c'],['#c084fc','#9333ea'],['#f0abfc','#d946ef'],['#fbb6ce','#f472b6']];
function orchid(ctx,x,y,size,prog,hue){
  if(prog<=.01) return;
  var s=size*prog; if(s<.5) return;
  var c1=ORCHID_COLS[hue%4][0],c2=ORCHID_COLS[hue%4][1];
  ctx.save(); ctx.translate(x,y);
  var gr=ctx.createRadialGradient(0,0,0,0,0,s*1.6);
  gr.addColorStop(0,c1+'50'); gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(0,0,s*1.6,0,Math.PI*2); ctx.fill();
  for(var i=0;i<5;i++){
    ctx.save(); ctx.rotate((i/5)*Math.PI*2);
    var pg=ctx.createRadialGradient(0,-s*.6,0,0,-s*.6,s*.72);
    pg.addColorStop(0,'#fff0f8'); pg.addColorStop(.3,c1); pg.addColorStop(1,c2);
    ctx.fillStyle=pg; ctx.shadowColor=c1; ctx.shadowBlur=14*prog;
    ctx.beginPath(); ctx.ellipse(0,-s*.55,s*.28,s*.56,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  var cg=ctx.createRadialGradient(0,0,0,0,0,s*.32);
  cg.addColorStop(0,'#fffde7'); cg.addColorStop(1,'#f5c842');
  ctx.fillStyle=cg; ctx.shadowColor='#f5c842'; ctx.shadowBlur=18*prog;
  ctx.beginPath(); ctx.arc(0,0,s*.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function bounce(p){ return p<.7?p/.7:1+Math.sin((p-.7)/.3*Math.PI)*.13*(1-p); }

let petals=[];
function spawnPetal(x,y){
  petals.push({x:x,y:y,vx:(Math.random()-.5)*1.4,vy:Math.random()*.6+.3,
    ang:Math.random()*Math.PI*2,dA:(Math.random()-.5)*.045,
    sz:Math.random()*8+4,life:1,col:ORCHID_COLS[0|Math.random()*4][0]});
}

let tProgress=0,treeDone=false,tAnimStart=null,sceneOn=false;
function drawTree(t){
  var b=getBase(),h=getTreeH();
  var tp=Math.min(1,t/.45);
  if(tp>0){
    var g=sCx.createLinearGradient(b.x,b.y,b.x,b.y-h*tp);
    g.addColorStop(0,'#5c2a00'); g.addColorStop(.5,'#8b4513'); g.addColorStop(1,'#6b3410');
    sCx.save(); sCx.shadowColor='rgba(192,132,252,.3)'; sCx.shadowBlur=18;
    sCx.strokeStyle=g; sCx.lineWidth=18; sCx.lineCap='round';
    sCx.beginPath(); sCx.moveTo(b.x,b.y);
    sCx.quadraticCurveTo(b.x+4,b.y-h*tp*.5,b.x,b.y-h*tp);
    sCx.stroke(); sCx.restore();
  }
  BRANCHES.forEach(function(br){
    if(t<br.d) return;
    var bp=Math.min(1,(t-br.d)/.18);
    var sx=b.x+br.sx*h,sy=b.y-br.sy*h,ex=b.x+br.ex*h,ey=b.y-br.ey*h;
    sCx.save(); sCx.strokeStyle='#7a3d12'; sCx.lineWidth=br.w*(1-bp*.3); sCx.lineCap='round';
    sCx.shadowColor='rgba(192,132,252,.2)'; sCx.shadowBlur=9;
    sCx.beginPath(); sCx.moveTo(sx,sy); sCx.lineTo(sx+(ex-sx)*bp,sy+(ey-sy)*bp);
    sCx.stroke(); sCx.restore();
  });
}

function sceneLoop(ts){
  if(!sceneOn) return;
  sCx.clearRect(0,0,W,H);
  if(!tAnimStart) tAnimStart=ts;
  tProgress=Math.min(1,(ts-tAnimStart)/2200);
  drawTree(tProgress);
  var b=getBase(),h=getTreeH();
  treeFlowers.forEach(function(f,i){
    if(!f.on) return;
    f.p=Math.min(1,f.p+.025);
    orchid(sCx,b.x+f.rx*h,b.y-f.ry*h,f.sz,bounce(f.p),i%4);
    if(f.p>=1&&Math.random()<.003) spawnPetal(b.x+f.rx*h,b.y-f.ry*h);
  });
  if(spiralActive){
    spiralFlowers.forEach(function(f,i){
      if(!f.on) return;
      f.p=Math.min(1,f.p+.023);
      orchid(sCx,f.x,f.y,f.sz,bounce(f.p),f.hue);
      if(f.p>=1&&Math.random()<.007) spawnPetal(f.x,f.y);
    });
  }
  petals=petals.filter(function(p){ return p.life>0; });
  petals.forEach(function(p){
    p.x+=p.vx+Math.sin(p.ang)*.5; p.y+=p.vy; p.ang+=p.dA; p.life-=.004;
    if(p.sz<.5) return;
    sCx.save(); sCx.globalAlpha=p.life; sCx.translate(p.x,p.y); sCx.rotate(p.ang);
    var pg=sCx.createRadialGradient(0,0,0,0,0,p.sz);
    pg.addColorStop(0,'#fff0f8'); pg.addColorStop(1,p.col);
    sCx.fillStyle=pg; sCx.beginPath(); sCx.ellipse(0,0,p.sz*.5,p.sz,0,0,Math.PI*2); sCx.fill();
    sCx.restore();
  });
  if(!treeDone&&tProgress>=1){ treeDone=true; activateTreeFlowers(); }
  requestAnimationFrame(sceneLoop);
}

function activateTreeFlowers(){
  // Arrancar Flores Amarillas desde el segundo 17
  playFloresAmarillas();

  treeFlowers.forEach(function(f,i){
    setTimeout(function(){ f.on=true; chime([[523+i*28,0,.8],[659+i*18,120,.75]]); },f.dl);
  });
  setTimeout(nextMsg,1800);
}

// --- MENSAJES ---
const msgEl=document.getElementById('msg-text');
let mIdx=0;
function nextMsg(){
  if(mIdx>=MESSAGES.length){
    msgEl.classList.remove('show');
    setTimeout(function(){
      activateSpiral();
      setTimeout(showCounter,SPIRAL_N*95+2800);
    },700);
    return;
  }
  msgEl.innerHTML=MESSAGES[mIdx++];
  msgEl.classList.add('show');
  var dur=3200+MESSAGES[mIdx-1].replace(/<[^>]+>/g,'').length*28;
  setTimeout(function(){ msgEl.classList.remove('show'); setTimeout(nextMsg,900); },dur);
}

// --- CONTADOR ---
function showCounter(){
  document.getElementById('counter-wrap').classList.add('show');
  function upd(){
    var d=Date.now()-START_DATE;
    if(d<0) return;
    document.getElementById('cnt-days').textContent=String(0|d/86400000).padStart(3,'0');
    document.getElementById('cnt-hours').textContent=String(0|(d%86400000)/3600000).padStart(2,'0');
    document.getElementById('cnt-mins').textContent=String(0|(d%3600000)/60000).padStart(2,'0');
    document.getElementById('cnt-secs').textContent=String(0|(d%60000)/1000).padStart(2,'0');
  }
  upd(); setInterval(upd,1000);
}

// --- BURST ---
function burst(x,y){
  var BCOLS=['#ff6eb4','#c084fc','#f5c842','#ffd6f0'];
  for(var i=0;i<28;i++){
    var el=document.createElement('div');
    var a=(i/28)*Math.PI*2,dist=Math.random()*70+20,sz=Math.random()*10+3;
    var col=BCOLS[0|Math.random()*4];
    el.style.cssText='position:fixed;left:'+x+'px;top:'+y+'px;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';box-shadow:0 0 '+(sz*2)+'px '+col+';pointer-events:none;z-index:50;transition:transform .9s ease-out,opacity .9s ease-out;transform:translate(-50%,-50%)';
    document.body.appendChild(el);
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      el.style.transform='translate('+(Math.cos(a)*dist-sz/2)+'px,'+(Math.sin(a)*dist-sz/2)+'px)';
      el.style.opacity='0';
    }); });
    setTimeout(function(){ el.remove(); },1000);
  }
}

// --- INICIO ---
function go(){
  initAC();
  chime([[440,0,.6],[523,150,.6],[659,300,.8],[784,500,1.0]]);
  document.getElementById('intro').classList.add('hidden');
  var sd=document.getElementById('seed-anim');
  var sx=innerWidth/2-16,sy=innerHeight*.42,ty=innerHeight*.845;
  sd.style.position='fixed'; sd.style.left=sx+'px'; sd.style.top=sy+'px';
  sd.style.display='block'; sd.style.opacity='1';
  var t0=performance.now();
  function fall(ts){
    var p=Math.min(1,(ts-t0)/1200),e=p*p;
    sd.style.top=(sy+(ty-sy)*e)+'px';
    sd.style.left=(sx+Math.sin(p*Math.PI*3)*6*(1-p))+'px';
    sd.style.opacity=String(1-p*.28);
    if(p<1){ requestAnimationFrame(fall); return; }
    sd.style.display='none';
    burst(innerWidth/2,ty+14);
    tone(220,.42,'sine',.11);
    setTimeout(function(){
      document.getElementById('scene').classList.add('visible');
      sceneOn=true;
      requestAnimationFrame(sceneLoop);
      chime([[261,0,1.5],[329,200,1.5],[392,400,1.5],[523,700,2.0],[659,1100,2.0],[784,1600,2.5]]);
    },420);
  }
  requestAnimationFrame(fall);
}

var btn=document.getElementById('flower-btn');
btn.addEventListener('click',go);
btn.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' ') go(); });
</script>
